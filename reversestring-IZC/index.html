<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reverse String</title>
    <style>
        :root {
            --bg: #fafaf9;
            --surface: #ffffff;
            --border: #e7e5e4;
            --border-strong: #d6d3d1;
            --text: #1c1917;
            --text-muted: #78716c;
            --text-subtle: #a8a29e;
            --accent: #1c1917;
            --accent-hover: #292524;
            --accent-soft: #f5f5f4;
            --success: #15803d;
            --success-soft: #dcfce7;
            --danger: #b91c1c;
            --danger-soft: #fee2e2;
            --radius: 12px;
            --radius-sm: 8px;
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.04);
            --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.06);
            --font: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            --font-mono: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, "Liberation Mono", monospace;
        }

        * {
            box-sizing: border-box;
        }

        html, body {
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            background: var(--bg);
            color: var(--text);
            font-family: var(--font);
            font-size: 15px;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            display: flex;
            justify-content: center;
            padding: 32px 20px 80px;
        }

        .app {
            width: 100%;
            max-width: 720px;
        }

        header {
            margin-bottom: 28px;
        }

        .eyebrow {
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--text-subtle);
            margin: 0 0 8px;
        }

        h1 {
            font-size: 28px;
            font-weight: 600;
            letter-spacing: -0.02em;
            margin: 0 0 8px;
            color: var(--text);
        }

        .lead {
            color: var(--text-muted);
            margin: 0;
            font-size: 15px;
        }

        .lead code {
            font-family: var(--font-mono);
            font-size: 13px;
            background: var(--accent-soft);
            border: 1px solid var(--border);
            padding: 1px 6px;
            border-radius: 4px;
            color: var(--text);
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow-sm);
            overflow: hidden;
        }

        .field {
            padding: 16px 18px 14px;
        }

        .field + .field {
            border-top: 1px solid var(--border);
        }

        .field-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 8px;
        }

        .label {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-muted);
            margin: 0;
        }

        .meta {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: var(--text-subtle);
            font-variant-numeric: tabular-nums;
        }

        textarea, .output {
            width: 100%;
            min-height: 96px;
            font-family: var(--font-mono);
            font-size: 15px;
            line-height: 1.55;
            color: var(--text);
            background: transparent;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 12px 14px;
            resize: vertical;
            outline: none;
            transition: border-color 0.15s ease, box-shadow 0.15s ease;
        }

        textarea::placeholder {
            color: var(--text-subtle);
        }

        textarea:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(28, 25, 23, 0.08);
        }

        .output {
            min-height: 96px;
            white-space: pre-wrap;
            word-break: break-word;
            overflow-wrap: anywhere;
            background: var(--accent-soft);
            border-color: var(--border);
        }

        .output[data-empty="true"] {
            color: var(--text-subtle);
            font-style: italic;
            font-family: var(--font);
        }

        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding: 14px 18px;
            border-top: 1px solid var(--border);
            background: var(--bg);
        }

        button {
            font-family: inherit;
            font-size: 13px;
            font-weight: 500;
            line-height: 1;
            padding: 9px 14px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border-strong);
            background: var(--surface);
            color: var(--text);
            cursor: pointer;
            transition: background 0.15s ease, border-color 0.15s ease, color 0.15s ease, transform 0.05s ease;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        button:hover:not(:disabled) {
            background: var(--accent-soft);
            border-color: var(--text-muted);
        }

        button:active:not(:disabled) {
            transform: translateY(1px);
        }

        button:focus-visible {
            outline: 2px solid var(--accent);
            outline-offset: 2px;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        button.primary {
            background: var(--accent);
            color: #fafaf9;
            border-color: var(--accent);
        }

        button.primary:hover:not(:disabled) {
            background: var(--accent-hover);
            border-color: var(--accent-hover);
            color: #fafaf9;
        }

        .spacer {
            flex: 1;
        }

        .toast {
            position: fixed;
            left: 50%;
            bottom: 28px;
            transform: translateX(-50%) translateY(20px);
            background: var(--text);
            color: var(--bg);
            font-size: 13px;
            font-weight: 500;
            padding: 10px 16px;
            border-radius: 999px;
            box-shadow: var(--shadow-md);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease, transform 0.2s ease;
            z-index: 50;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .toast.error {
            background: var(--danger);
            color: #fff;
        }

        footer {
            margin-top: 24px;
            text-align: center;
            font-size: 12px;
            color: var(--text-subtle);
        }

        @media (max-width: 520px) {
            body {
                padding: 20px 14px 60px;
            }
            h1 {
                font-size: 24px;
            }
            .actions {
                padding: 12px;
            }
            button {
                flex: 1 1 auto;
                justify-content: center;
            }
            .spacer {
                display: none;
            }
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #0c0a09;
                --surface: #1c1917;
                --border: #292524;
                --border-strong: #44403c;
                --text: #fafaf9;
                --text-muted: #a8a29e;
                --text-subtle: #78716c;
                --accent: #fafaf9;
                --accent-hover: #e7e5e4;
                --accent-soft: #292524;
                --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.3);
                --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.4);
            }

            button.primary {
                color: var(--bg);
            }

            button.primary:hover:not(:disabled) {
                color: var(--bg);
            }

            .toast {
                background: var(--surface);
                color: var(--text);
                border: 1px solid var(--border-strong);
            }
        }
    </style>
</head>
<body>
    <main class="app">
        <header>
            <p class="eyebrow">AI4Devs · Exercise</p>
            <h1>Reverse String</h1>
            <p class="lead">Type any text and get it reversed. Works with Unicode and emojis — try <code>AI4Devs</code> or <code>👨‍👩‍👧🇪🇸</code>.</p>
        </header>

        <section class="card" aria-label="Reverse string tool">
            <div class="field">
                <div class="field-header">
                    <label class="label" for="input">Input</label>
                    <div class="meta">
                        <span id="inputCount" aria-live="polite">0 chars</span>
                    </div>
                </div>
                <textarea
                    id="input"
                    placeholder="Type or paste text here…"
                    autocomplete="off"
                    autocorrect="off"
                    autocapitalize="off"
                    spellcheck="false"
                ></textarea>
            </div>

            <div class="field">
                <div class="field-header">
                    <label class="label" for="output">Reversed</label>
                    <div class="meta">
                        <span id="outputCount" aria-live="polite">0 chars</span>
                    </div>
                </div>
                <div
                    id="output"
                    class="output"
                    data-empty="true"
                    role="region"
                    aria-live="polite"
                    aria-label="Reversed output"
                >Your reversed text will appear here.</div>
            </div>

            <div class="actions">
                <button id="reverseBtn" class="primary" type="button">Reverse</button>
                <button id="swapBtn" type="button" title="Move reversed text back to input">↻ Use as input</button>
                <div class="spacer"></div>
                <button id="copyBtn" type="button">Copy</button>
                <button id="clearBtn" type="button">Clear</button>
            </div>
        </section>

        <footer>
            <p>AI4Devs · LIDR.co · Reverse String exercise</p>
        </footer>
    </main>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>

    <script src="script.js"></script>
</body>
</html>
